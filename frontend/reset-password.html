<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | AI-Assisted Learning Platform</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
(function(){var t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light-theme');})();
</script>
</head>
<body class="auth-container">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <div class="logo-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#navGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon><line x1="12" y1="22" x2="12" y2="15.5"></line><polyline points="22 8.5 12 15.5 2 8.5"></polyline></svg></div>
            <h2 class="glow-text">Reset Password</h2>
            <p class="form-label" style="margin-top: 5px;">Enter your new password below</p>
        </div>
        
        <div id="status-message" class="aptitude-result" style="margin-bottom: 20px; text-align: center; display: none;"></div>
        
        <form id="reset-form">
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirm-password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-input" placeholder="Repeat new password" required minlength="6">
            </div>
            
            <button type="submit" class="btn-primary" id="submit-btn">Reset Password</button>
        </form>
        
        <div class="auth-footer">
            Back to <a href="/login" class="auth-link">Log In</a>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const statusMsg = document.getElementById("status-message");
        const resetForm = document.getElementById("reset-form");
        const submitBtn = document.getElementById("submit-btn");

        if (!token) {
            statusMsg.textContent = "Error: Invalid or missing password reset token.";
            statusMsg.className = "aptitude-result aptitude-result-incorrect";
            statusMsg.style.display = "block";
            resetForm.style.display = "none";
        }

        resetForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;
            
            if (password !== confirmPassword) {
                statusMsg.textContent = "Passwords do not match.";
                statusMsg.className = "aptitude-result aptitude-result-incorrect";
                statusMsg.style.display = "block";
                return;
            }
            
            statusMsg.style.display = "none";
            submitBtn.textContent = "Resetting...";
            submitBtn.disabled = true;
            
            try {
                const res = await fetch("/auth/reset-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    statusMsg.textContent = "Password reset successfully! Redirecting to login...";
                    statusMsg.className = "aptitude-result aptitude-result-correct";
                    statusMsg.style.display = "block";
                    resetForm.reset();
                    
                    // Redirect after 3 seconds
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 3000);
                } else {
                    statusMsg.textContent = data.detail || "Failed to reset password. Link may have expired.";
                    statusMsg.className = "aptitude-result aptitude-result-incorrect";
                    statusMsg.style.display = "block";
                }
            } catch (err) {
                console.error("Reset password error:", err);
                statusMsg.textContent = "Failed to connect to the server. Please try again.";
                statusMsg.className = "aptitude-result aptitude-result-incorrect";
                statusMsg.style.display = "block";
            } finally {
                submitBtn.textContent = "Reset Password";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
