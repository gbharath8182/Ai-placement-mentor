<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | AI Placement Mentor</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>(function(){var t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light-theme');})();</script>
</head>
<body>
    <nav class="dashboard-nav">
        <a href="/dashboard" class="nav-brand"><span>EduAI Platform</span></a>
        <div class="nav-user">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
            <a href="/roadmap" class="btn-secondary">Roadmaps</a>
            <a href="/profile" class="btn-secondary">Profile</a>
            <a href="/analytics" class="btn-secondary nav-link-active">Analytics</a>
            <a href="/playground" class="btn-secondary">Playground</a>
            <a href="/dashboard" class="btn-secondary">Dashboard</a>
            <div class="user-badge"><span id="user-name">Learner</span><span id="user-exp-badge" class="experience-tag exp-fresher">Fresher</span></div>
        </div>
    </nav>
    <main class="dashboard-container">
        <header class="dashboard-hero"><h1 class="dashboard-title">Learning Analytics</h1><p class="dashboard-subtitle">Time, consistency, solved topics, and skill coverage in one scan-friendly view.</p></header>
        <section class="analytics-cards" id="analytics-cards"></section>
        <section class="analytics-grid">
            <div class="glass-panel profile-panel"><h2>Time by Domain</h2><canvas id="domain-time-chart" height="240"></canvas></div>
            <div class="glass-panel profile-panel"><h2>Problems Solved</h2><canvas id="solved-chart" height="240"></canvas></div>
            <div class="glass-panel profile-panel analytics-wide"><h2>Skill Coverage</h2><canvas id="coverage-chart" height="180"></canvas></div>
        </section>
    </main>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/analytics.js"></script>
</body>
</html>
