<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AI-Assisted Learning Platform</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
(function(){var t=localStorage.getItem('theme')||'dark';if(t==='light')document.documentElement.classList.add('light-theme');})();
</script>
</head>
<body class="auth-container">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <div class="logo-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="url(#navGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="navGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#c084fc"/></linearGradient></defs><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon><line x1="12" y1="22" x2="12" y2="15.5"></line><polyline points="22 8.5 12 15.5 2 8.5"></polyline></svg></div>
            <h2 class="glow-text">Forgot Password</h2>
            <p class="form-label" style="margin-top: 5px;">Enter your email to receive a password reset link</p>
        </div>
        
        <div id="status-message" class="aptitude-result" style="margin-bottom: 20px; text-align: center; display: none;"></div>
        
        <form id="forgot-form">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="e.g. learner@example.com" required>
            </div>
            
            <button type="submit" class="btn-primary" id="submit-btn">Send Reset Link</button>
        </form>
        
        <div class="auth-footer">
            Remembered your password? <a href="/login" class="auth-link">Log In</a>
        </div>
    </div>
    
    <script>
        document.getElementById("forgot-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const email = document.getElementById("email").value;
            const statusMsg = document.getElementById("status-message");
            const submitBtn = document.getElementById("submit-btn");
            
            statusMsg.style.display = "none";
            submitBtn.textContent = "Sending...";
            submitBtn.disabled = true;
            
            try {
                const res = await fetch("/auth/forgot-password", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                if (data.reset_link) {
                    statusMsg.innerHTML = `If the email exists, a reset link has been generated.<br><br><span style="display:block; padding: 10px; background: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.3); border-radius: 6px; font-size: 0.9rem;"><strong>[Development Mode]</strong><br><a href="${data.reset_link}" style="color: var(--accent-primary); text-decoration: underline;">Click here to Reset Password directly</a></span>`;
                } else {
                    statusMsg.textContent = data.message || "A password reset link has been sent.";
                }
                statusMsg.className = "aptitude-result aptitude-result-correct";
                statusMsg.style.display = "block";
            } catch (err) {
                console.error("Forgot password error:", err);
                statusMsg.textContent = "Failed to connect to the server. Please try again.";
                statusMsg.className = "aptitude-result aptitude-result-incorrect";
                statusMsg.style.display = "block";
            } finally {
                submitBtn.textContent = "Send Reset Link";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
