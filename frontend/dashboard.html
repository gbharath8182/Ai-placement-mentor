<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AI-Assisted Learning Platform</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="dashboard-nav">
        <a href="/dashboard" class="nav-brand">🚀 <span>EduAI Platform</span></a>
        <div class="nav-user">
            <a href="/aptitude" class="btn-secondary" style="text-decoration: none; border-color: var(--accent-secondary); color: var(--accent-secondary);">🧠 Aptitude Test</a>
            <div class="user-badge" id="user-badge-container">
                <span id="user-name">Learner</span>
                <span id="user-exp-badge" class="experience-tag exp-fresher">Fresher</span>
            </div>
            <button class="btn-secondary" onclick="logoutUser()">Logout</button>
        </div>
    </nav>
    
    <!-- Central content -->
    <main class="dashboard-container">
        <header class="dashboard-hero">
            <h1 class="dashboard-title">Welcome back, <span id="hero-user-name" class="glow-text">Learner</span>!</h1>
            <p class="dashboard-subtitle">Select a domain below to access GFG-style topics and your adaptive AI learning sidebar.</p>
        </header>
        
        <!-- Domain Cards Grid -->
        <h2 style="font-size: 1.5rem; margin-top: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Study Domains</h2>
        <div class="domain-grid" id="domain-grid">
            <!-- Dynamically populated from API -->
            <div style="color: var(--text-muted); text-align: center; grid-column: 1/-1; padding: 40px;">
                Loading learning domains...
            </div>
        </div>
        
        <!-- Topics list drawer (appears when domain clicked) -->
        <section class="topics-drawer glass-panel" id="topics-drawer">
            <div class="topics-header">
                <h2 id="drawer-domain-title">Topics</h2>
                <button class="btn-secondary" id="close-drawer-btn" style="padding: 4px 10px; font-size: 0.8rem;">Close</button>
            </div>
            <div class="topic-list" id="topic-list">
                <!-- Dynamically populated -->
            </div>
        </section>
    </main>
    
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
